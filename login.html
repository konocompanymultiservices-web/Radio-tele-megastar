<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion &mdash; Radio T&eacute;l&eacute; Mega Star</title>
  <link rel="icon" type="image/jpeg" href="images/radio_tele_mega_star_logo.jpg"/>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0a0a0a;--s1:#111;--s2:#1a1a1a;--s3:#222;--s4:#2a2a2a;
      --t1:#f0f0f0;--t2:#a0a0a0;--t3:#666;
      --y:#FFD600;--y2:#E5C000;--r:#cc0000;--g:#22c55e;
    }
    body{background:var(--bg);color:var(--t1);font-family:'Lato',sans-serif;min-height:100vh}
    a{text-decoration:none;color:inherit}

    .auth-wrap{min-height:100vh;display:grid;grid-template-columns:1fr 1fr}

    /* BRAND */
    .auth-brand{
      background:linear-gradient(150deg,#0a0a0a 0%,#110000 100%);
      border-right:1px solid var(--s3);
      display:flex;flex-direction:column;padding:40px;
    }
    .brand-back{
      display:inline-flex;align-items:center;gap:6px;font-size:13px;
      color:var(--t3);transition:color .2s;align-self:flex-start;
    }
    .brand-back:hover{color:var(--t1)}
    .brand-center{flex:1;display:flex;flex-direction:column;justify-content:center;padding:32px 0}
    .brand-logo{width:76px;height:76px;border-radius:50%;border:3px solid var(--y);object-fit:cover;margin-bottom:24px}
    .brand-name{font-family:'Oswald',sans-serif;font-size:38px;font-weight:700;color:var(--t1);line-height:1.1;margin-bottom:8px}
    .brand-freq{font-size:12px;color:var(--y);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:28px}
    .brand-live{
      display:inline-flex;align-items:center;gap:8px;
      background:rgba(204,0,0,.08);border:1px solid rgba(204,0,0,.25);
      border-radius:20px;padding:6px 14px;font-size:11px;
      color:#ff8080;font-weight:600;letter-spacing:1px;margin-bottom:36px;width:fit-content;
    }
    .live-dot{width:7px;height:7px;background:var(--r);border-radius:50%;animation:blink 1.2s ease-in-out infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
    .brand-quote{font-size:15px;color:var(--t2);line-height:1.7;border-left:3px solid var(--y);padding-left:16px;font-style:italic}

    /* FORM PANEL */
    .auth-panel{background:var(--s1);display:flex;align-items:center;justify-content:center;padding:40px}
    .auth-box{width:100%;max-width:400px}
    .auth-box h2{font-family:'Oswald',sans-serif;font-size:30px;font-weight:700;color:var(--t1);margin-bottom:6px}
    .auth-box>p{font-size:14px;color:var(--t2);margin-bottom:32px}

    /* Message */
    .auth-msg{padding:12px 16px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}
    .auth-msg.ok{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:var(--g)}
    .auth-msg.err{background:rgba(204,0,0,.1);border:1px solid rgba(204,0,0,.3);color:#ff8080}

    /* Form */
    form{display:flex;flex-direction:column;gap:16px}
    .field{display:flex;flex-direction:column;gap:7px}
    .field label{font-size:11px;color:var(--t2);font-weight:700;letter-spacing:.8px;text-transform:uppercase}
    .field input{
      background:var(--s2);border:1px solid var(--s3);border-radius:8px;
      padding:13px 16px;color:var(--t1);font-family:'Lato',sans-serif;
      font-size:14px;outline:none;transition:border-color .2s;
    }
    .field input:focus{border-color:var(--y)}
    .field input::placeholder{color:var(--t3)}
    .btn-submit{
      background:var(--y);color:#000;border:none;border-radius:8px;
      padding:14px;font-family:'Oswald',sans-serif;font-size:15px;font-weight:600;
      letter-spacing:.5px;cursor:pointer;transition:all .2s;margin-top:4px;
    }
    .btn-submit:hover{background:var(--y2);transform:translateY(-1px)}
    .btn-submit:disabled{opacity:.6;cursor:wait;transform:none}
    .auth-footer{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:24px;font-size:13px;color:var(--t3)}
    .auth-footer a{color:var(--t2);transition:color .2s}
    .auth-footer a:hover{color:var(--y)}
    .auth-footer span{color:var(--s4)}

    @media(max-width:768px){
      .auth-wrap{grid-template-columns:1fr}
      .auth-brand{display:none}
      .auth-panel{padding:48px 24px;align-items:flex-start;padding-top:72px}
    }
  </style>
</head>
<body>
<div class="auth-wrap">

  <!-- BRAND -->
  <div class="auth-brand">
    <a href="index.html" class="brand-back">&#8592; Retour au site</a>
    <div class="brand-center">
      <img src="images/radio_tele_mega_star_logo.jpg" alt="Logo" class="brand-logo"/>
      <h1 class="brand-name">Radio T&eacute;l&eacute;<br/>Mega Star</h1>
      <p class="brand-freq">97.3 FM &middot; CH. 60 &middot; Cable 116</p>
      <div class="brand-live"><span class="live-dot"></span> EN DIRECT 24H/24</div>
      <blockquote class="brand-quote">La voix qui unit, informe<br/>et inspire Ha&iuml;ti &#127462;&#127481;</blockquote>
    </div>
  </div>

  <!-- FORM -->
  <div class="auth-panel">
    <div class="auth-box">
      <h2>Bon retour!</h2>
      <p>Connectez-vous &agrave; votre espace personnel</p>

      <div id="login-msg" class="auth-msg"></div>

      <form onsubmit="soumettreLogin(event)">
        <div class="field">
          <label>Adresse email</label>
          <input type="email" name="email" placeholder="jean@email.com" required/>
        </div>
        <div class="field">
          <label>Mot de passe</label>
          <input type="password" name="password" placeholder="Votre mot de passe" required/>
        </div>
        <button type="submit" class="btn-submit">Se connecter &#8594;</button>
      </form>

      <div class="auth-footer">
        <a href="#" onclick="demanderReset()">Mot de passe oubli&eacute;?</a>
        <span>&#183;</span>
        <a href="register.html">Cr&eacute;er un compte</a>
      </div>
    </div>
  </div>
</div>

<script>
const API = "https://radio-megastar-backend-production.up.railway.app";

function showMsg(texte, ok) {
  const m = document.getElementById('login-msg');
  m.style.display = 'block';
  m.className = 'auth-msg ' + (ok ? 'ok' : 'err');
  m.textContent = texte;
}

function soumettreLogin(e) {
  e.preventDefault();
  const f = e.target;
  const email = f.querySelector('[name="email"]').value;
  const password = f.querySelector('[name="password"]').value;
  const btn = f.querySelector('button');
  btn.textContent = 'Connexion...'; btn.disabled = true;

  fetch(API + '/api/auth/connexion', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, motDePasse: password })
  })
  .then(r => r.json())
  .then(data => {
    btn.textContent = 'Se connecter →'; btn.disabled = false;
    if (data.success && data.token) {
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      showMsg('Koneksyon reyisi! Redireksyon...', true);
      setTimeout(() => {
        window.location.href = data.user.role === 'admin' ? 'admin.html' : 'dashboard.html';
      }, 800);
    } else {
      showMsg(data.message || 'Email oswa modpas enkòrèk', false);
    }
  })
  .catch(() => { btn.textContent = 'Se connecter →'; btn.disabled = false; showMsg('Erè serveur', false); });
}

function demanderReset() {
  const email = prompt('Antre email ou pou resevwa lyen reset:');
  if (!email) return;
  fetch(API + '/api/auth/reset-password', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email })
  })
  .then(r => r.json())
  .then(data => showMsg(data.success ? 'Email voye! Verifye bwat mail ou.' : data.message, data.success))
  .catch(() => showMsg('Erè serveur', false));
}

const token = localStorage.getItem('token');
const user = localStorage.getItem('user');
if (token && user) {
  const u = JSON.parse(user);
  window.location.href = u.role === 'admin' ? 'admin.html' : 'dashboard.html';
}
</script>
</body>
</html>
